<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Challenge Frontend</title>
</head>
<body>
    <h1>
        Inserire i seguenti dati
    </h1>
    <form onsubmit="alert('Registrazione inviata')">
        <div>
            <input type="text" placeholder="Inserire il nome">
        </div>
        <div>
            <input type="text" placeholder="Inserire il cognome">
        </div>
        <div>
            <input type="email" placeholder="Inserire l'email">
        </div>
        <div>
            <input type="password" placeholder="Inserire la password">
        </div>
        <div>
            <input type="date" placeholder="Inserire la data di nascita">
        </div>
        <div>
            <input type="number" placeholder="Inserire il numero di telefono">
        </div>
        <p>
            Selezionare i gusti musicali preferiti
        </p>
        <div>
            <input type="checkbox">
            <label>Pop</label>
        </div>
        <div>
            <input type="checkbox">
            <label>Rock</label>
        </div>
        <div>
            <input type="checkbox">
            <label>Hip-Hop</label>
        </div>
        <div>
            <input type="checkbox">
            <label>Soul</label>
        </div>
        <div>
            <input type="radio">
            <label>Accetto i Termini di Servizio</label>
        </div>
        <button type="submit">Invia la registrazione</button>
    </form>
</body>
</html>
