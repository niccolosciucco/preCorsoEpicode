<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Youtube - Web Prep</title>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap');

      body {
        display: flex;
        margin: 0;
        height: 100vh;
        font-family: 'Roboto', sans-serif;
      }

      .main {
        width: 100%;
      }

      .topbar {
        height: 8vh;
        display: flex;
        align-items: center;
        justify-content: space-between;
      }

      .content {
        height: 100%;
      }

      .icon {
        height: 8vh;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        padding: 0 2em;
        cursor: pointer;
      }

      .icon ion-icon {
        font-size: 2em;
      }

      .icon p {
        margin: 0;
      }

      .icon:not(:first-of-type) {
        height: 16vh;
      }

      .logo {
        height: 50%;
      }

      .search-wrapper {
        display: flex;
        height: 50%;
        width: 30%;
      }

      .search-wrapper input {
        width: 100%;
        padding: 0 1em;
      }

      .icons-wrapper {
        display: flex;
        align-items: center;
      }

      .top-icon {
        font-size: 2em;
        padding: 0 0.5em;
      }

      .mic-icon {
        display: flex;
        align-items: center;
      }

      .search-btn {
        padding: 0 0.7em;
        font-size: 1.3em;
        display: flex;
        align-items: center;
      }

      .videos{
      display: flex;
      flex-wrap: wrap;
      gap: 2em;            
      align-content: flex-start;
    }


    .video-card{
      display: flex;
      flex-direction: column;
      width: 30%;          
      min-width: 260px;     
    }

    .video-thumb{
      width: 100%;
      height: auto;
      display: block;
      border-radius: 2px;
    }

    .video-meta{
      display: flex;
      gap: 0.8em;
      margin-top: 0.8em;
    }

    .channel-avatar{
      width: 40px;
      height: 40px;
      border-radius: 50%;
      object-fit: cover;
    }

    .video-text{
      display: flex;
      flex-direction: column;
    }

    .video-title{
      margin: 0;
      font-weight: 700;
      font-size: 0.95em;
    }

    .video-desc{
      margin: 0.2em 0 0;
      font-size: 0.8em;
      color: #555;
    }

  </style>
  </head>
  <body>
    <div class="sidebar">
      <div class="icon">
        <ion-icon name="menu-sharp"></ion-icon>
      </div>
      <div class="icon">
        <ion-icon name="home-outline"></ion-icon>
        <p>Home</p>
      </div>
      <div class="icon">
        <ion-icon name="compass-outline"></ion-icon>
        <p>Explore</p>
      </div>
      <div class="icon">
        <ion-icon name="albums-outline"></ion-icon>
        <p>Library</p>
      </div>
    </div>
    <div class="main">
      <div class="topbar">
        <img class="logo" src="assets/yt-logo.svg" alt="yt-logo" />
        <div class="search-wrapper">
          <input type="text" placeholder="Search on YouTube" />
          <button class="search-btn">
            <ion-icon name="search"></ion-icon>
          </button>
          <div class="top-icon mic-icon">
            <ion-icon name="mic-sharp"></ion-icon>
          </div>
        </div>
        <div class="icons-wrapper">
          <div class="top-icon">
            <ion-icon name="videocam-outline"></ion-icon>
          </div>
          <div class="top-icon">
            <ion-icon name="notifications-outline"></ion-icon>
          </div>
          <div class="top-icon">
            <ion-icon name="person-circle-outline"></ion-icon>
          </div>
        </div>
      </div>
      <div class="content">
  <div class="videos">

    <div class="video-card">
      <img class="video-thumb" src="assets/epicode_thumb.png" alt="thumb" />
      <div class="video-meta">
        <img class="channel-avatar" src="assets/epicode-logo.png" alt="avatar" />
        <div class="video-text">
          <p class="video-title">Title</p>
          <p class="video-desc">Description</p>
        </div>
      </div>
    </div>

    <div class="video-card">
      <img class="video-thumb" src="assets/epicode_thumb.png" alt="thumb" />
      <div class="video-meta">
        <img class="channel-avatar" src="assets/epicode-logo.png" alt="avatar" />
        <div class="video-text">
          <p class="video-title">Title</p>

        </div>
      </div>
    </div>

      <div class="video-meta">

        <div class="video-text">
          <p class="video-title">Title</p>

        </div>
      </div>
    </div>

    <div class="video-card">
      <img class="video-thumb" src="assets/epicode_thumb.png" alt="thumb" />
      <div class="video-meta">
        <img class="channel-avatar" src="assets/epicode-logo.png" alt="avatar" />
        <div class="video-text">
          <p class="video-title">Title</p>

      </div>
    </div>

        <img class="channel-avatar" src="assets/epicode-logo.png" alt="avatar" />
        <div class="video-text">
          <p class="video-title">Title</p>

        </div>
      </div>
    </div>

    <div class="video-card">
      <img class="video-thumb" src="assets/epicode_thumb.png" alt="thumb" />
      <div class="video-meta">
        <img class="channel-avatar" src="assets/epicode-logo.png" alt="avatar" />

          <p class="video-title">Title</p>

    </div>

  </div>
</div>
    </div>
    <script
      type="module"
      src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.esm.js"
    ></script>
    <script

  </body>
</html>
